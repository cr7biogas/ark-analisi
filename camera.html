<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>📷 ARK Camera</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
    .container { height: 100%; display: flex; flex-direction: column; padding: 0; max-width: 100%; }
    
    .video-wrapper {
      position: relative;
      flex: 1;
      overflow: hidden;
    }
    
    video { 
      position: absolute;
      width: 100%; 
      height: 100%;
      object-fit: cover;
      opacity: 0; /* Hidden behind canvas */
    }
    
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    
    #outputCanvas {
      z-index: 10; /* Above everything */
    }
    
    .position-guide {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60%;
      height: 85%;
      border: 3px dashed rgba(46, 204, 113, 0.9);
      border-radius: 20px;
      z-index: 5;
      pointer-events: none;
      /* No shadow on skeleton mode - already black bg */
    }
    
    .position-guide::before {
      content: '👤 Posizionati qui';
      position: absolute;
      top: -35px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(46, 204, 113, 0.9);
      color: white;
      padding: 6px 15px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    
    .position-guide.recording {
      border-color: rgba(233, 69, 96, 0.9);
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.1);
    }
    
    .position-guide.recording::before {
      content: '🔴 REGISTRAZIONE';
      background: rgba(233, 69, 96, 0.9);
    }
    
    .overlay {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 15px;
      background: linear-gradient(rgba(0,0,0,0.8), transparent);
      display: flex; justify-content: space-between; align-items: center;
      z-index: 10;
    }
    .status { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.offline { background: #e74c3c; }
    .dot.connecting { background: #f1c40f; animation: blink 1s infinite; }
    .dot.online { background: #2ecc71; }
    .dot.recording { background: #e94560; animation: blink 0.5s infinite; }
    @keyframes blink { 50% { opacity: 0.3; } }
    .cam-name { background: #e94560; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    
    .score-badge {
      position: absolute;
      top: 70px;
      right: 15px;
      background: rgba(0,0,0,0.8);
      padding: 10px 20px;
      border-radius: 15px;
      text-align: center;
      z-index: 10;
    }
    .score-badge .score { font-size: 36px; font-weight: 800; color: #00d4ff; }
    .score-badge .label { font-size: 10px; color: #888; }
    
    .rec-indicator {
      position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
      background: #e94560; padding: 10px 30px; border-radius: 30px;
      font-weight: 700; font-size: 18px; display: none;
      animation: blink 1s infinite; z-index: 10;
    }
    .rec-indicator.active { display: flex; align-items: center; gap: 10px; }
    
    .bottom-panel {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.95));
      padding: 40px 20px 20px;
      z-index: 10;
    }
    .info { text-align: center; margin-bottom: 20px; }
    .info .label { font-size: 11px; color: #888; margin-bottom: 5px; }
    .info .value { font-size: 24px; font-weight: 700; color: #2ecc71; }
    .info .sub { font-size: 12px; color: #666; margin-top: 5px; }
    
    .timer { font-size: 48px; font-weight: 800; font-family: monospace; text-align: center; margin-bottom: 15px; color: #fff; }
    .timer.recording { color: #e94560; }
    
    .controls { display: flex; gap: 10px; justify-content: center; }
    .btn { padding: 12px 20px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #e94560; color: white; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
    .btn-danger { background: #c0392b; color: white; }
    
    .setup {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 30px; z-index: 100;
    }
    .setup.hidden { display: none; }
    .setup .logo { font-size: 70px; margin-bottom: 15px; }
    .setup h1 { font-size: 26px; margin-bottom: 8px; }
    .setup p { color: #888; font-size: 14px; margin-bottom: 30px; text-align: center; }
    .setup input, .setup select {
      width: 100%; max-width: 280px; padding: 15px; border-radius: 12px;
      border: 2px solid #333; background: rgba(255,255,255,0.05);
      color: white; font-size: 16px; text-align: center; margin-bottom: 15px;
    }
    .setup input:focus, .setup select:focus { outline: none; border-color: #e94560; }
    .setup .btn { width: 100%; max-width: 280px; }
    .setup .loading { margin-top: 20px; color: #888; }
  </style>
</head>
<body>
  <div class="setup hidden" id="setup">
    <div class="logo">📷</div>
    <h1>ARK Camera</h1>
    <p>Connessione in corso...</p>
    <p class="loading" id="loadingText">Avvio camera...</p>
  </div>
  
  <div class="container">
    <div class="video-wrapper">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="outputCanvas"></canvas>
      <div class="position-guide" id="positionGuide"></div>
      
      <div class="overlay">
        <div class="status">
          <div class="dot offline" id="dot"></div>
          <span id="statusText">Offline</span>
        </div>
        <div class="cam-name" id="nameLabel">Camera</div>
      </div>
      
      <div class="score-badge" id="scoreBadge" style="display:none">
        <div class="score" id="liveScore">--</div>
        <div class="label">SCORE</div>
      </div>
      
      <div class="rec-indicator" id="recIndicator">⏺ REC</div>
    </div>
    
    <div class="bottom-panel">
      <div class="timer" id="timer">00:00</div>
      <div class="info">
        <div class="label">CAMERA ID</div>
        <div class="value" id="camId">---</div>
        <div class="sub" id="connInfo">In attesa...</div>
      </div>
      <div class="controls">
        <button class="btn btn-secondary" onclick="switchCam()">🔄 Flip</button>
        <button class="btn btn-primary" id="recBtn" onclick="toggleRecording()">⏺ REC</button>
        <button class="btn btn-danger" onclick="stop()">⏹️ Esci</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { DB } from './firebase-config.js';
    import { PoseEngine, SkeletonRenderer } from './lib/pose-engine.js';
    import { ScoreCalculator, getGrade } from './lib/scoring.js';
    
    const ICE_SERVERS = [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'stun:stun.cloudflare.com:3478' },
      { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
    ];
    
    const params = new URLSearchParams(location.search);
    
    // Session ID: FIXED - always use "ark_main" for simplicity
    const sessionId = 'ark_main';
    console.log('🔑 Session ID (fixed):', sessionId);
    
    // Auto-start immediately - position set from regia
    setTimeout(() => start(true), 500);
    
    let camId = null;
    let athleteName = '';
    let position = '';
    let movement = 'squat';
    let stream = null;
    let facingMode = 'environment';
    let heartbeatInterval = null;
    
    // Pose analysis
    let poseEngine = null;
    let skeletonRenderer = null;
    let scoreCalculator = null;
    let analysisLoop = null;
    
    // Canvas for output (video + skeleton)
    const video = document.getElementById('video');
    const outputCanvas = document.getElementById('outputCanvas');
    const outputCtx = outputCanvas.getContext('2d');
    
    // WebRTC
    let regiaPC = null;
    let regiaUnsubscribers = [];
    let regiaCandidates = new Set();
    let webrtcStream = null;  // For regia preview (direct video)
    let recordingStream = null; // For recording (canvas with skeleton)
    
    // Recording
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;
    let recordingStartTime = null;
    let timerInterval = null;
    
    function setStatus(status, text) {
      document.getElementById('dot').className = 'dot ' + status;
      document.getElementById('statusText').textContent = text;
    }
    
    function updateTimer() {
      if (!recordingStartTime) return;
      const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
      const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
      const sec = (elapsed % 60).toString().padStart(2, '0');
      document.getElementById('timer').textContent = `${min}:${sec}`;
    }
    
    window.start = async (autoStart = false) => {
      // Position will be set from regia, use saved or default
      position = localStorage.getItem('arkCamera_position') || 'camera';
      
      // Movement will come from regia command, default to squat
      movement = 'squat';
      athleteName = `Camera ${position}`;
      
      const loadingText = document.getElementById('loadingText');
      loadingText.style.display = 'block';
      loadingText.textContent = autoStart ? 'Riconnessione...' : 'Avvio camera...';
      
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { 
            facingMode, 
            width: { ideal: 1920, min: 1280 }, 
            height: { ideal: 1080, min: 720 }, 
            frameRate: { ideal: 30, min: 24 }
          },
          audio: true
        });
        console.log('📹 Camera quality:', stream.getVideoTracks()[0].getSettings());
        
        video.srcObject = stream;
        await video.play();
        
        // Setup canvas
        outputCanvas.width = video.videoWidth || 1280;
        outputCanvas.height = video.videoHeight || 720;
        
        loadingText.textContent = 'Caricamento AI posturale...';
        
        // Try to init pose engine with timeout fallback
        let poseReady = false;
        const poseTimeout = setTimeout(() => {
          if (!poseReady) {
            console.warn('MediaPipe timeout - using video-only mode');
            loadingText.textContent = 'AI non disponibile - modalità video';
            finishSetup(false);
          }
        }, 10000);
        
        try {
          poseEngine = new PoseEngine({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5,
            onResults: handlePoseResults,
            onReady: () => {
              if (!poseReady) {
                poseReady = true;
                clearTimeout(poseTimeout);
                console.log('PoseEngine ready');
                finishSetup(true);
              }
            }
          });
          
          await poseEngine.init();
        } catch (poseErr) {
          console.warn('MediaPipe failed:', poseErr);
          if (!poseReady) {
            poseReady = true;
            clearTimeout(poseTimeout);
            finishSetup(false);
          }
        }
        
      } catch (e) {
        alert('Errore: ' + e.message);
        loadingText.textContent = 'Errore: ' + e.message;
      }
    };
    
    let usePoseAnalysis = false;
    
    function finishSetup(withPose = true) {
      usePoseAnalysis = withPose;
      
      document.getElementById('setup').classList.add('hidden');
      document.getElementById('nameLabel').textContent = `${athleteName} - ${position}`;
      // recBtn is now always visible
      
      if (withPose) {
        document.getElementById('scoreBadge').style.display = 'block';
      }
      
      // Wake lock
      if ('wakeLock' in navigator) {
        navigator.wakeLock.request('screen').catch(() => {});
      }
      
      camId = 'cam_' + Math.random().toString(36).substr(2, 8);
      document.getElementById('camId').textContent = camId;
      
      if (withPose) {
        // Setup skeleton renderer
        skeletonRenderer = new SkeletonRenderer(outputCanvas, {
          jointRadius: 6,
          lineWidth: 3
        });
        
        // Setup score calculator
        scoreCalculator = new ScoreCalculator(movement);
        
        // Start analysis loop
        startAnalysisLoop();
      } else {
        // Video-only mode - just draw video to canvas
        startVideoOnlyLoop();
      }
      
      // Canvas stream for both WebRTC and recording (skeleton only, black bg)
      recordingStream = outputCanvas.captureStream(30);
      const audioTrack = stream.getAudioTracks()[0];
      if (audioTrack) recordingStream.addTrack(audioTrack);
      webrtcStream = recordingStream; // Same stream for both
      console.log('[Stream] Canvas stream (skeleton only):', {
        tracks: recordingStream.getTracks().map(t => ({ kind: t.kind, enabled: t.enabled, readyState: t.readyState }))
      });
      
      // Register camera
      registerCamera();
      
      setStatus('connecting', 'Pronto');
    }
    
    function startAnalysisLoop() {
      const drawFrame = () => {
        // Draw video frame
        if (video.readyState >= 2) {
          outputCtx.drawImage(video, 0, 0, outputCanvas.width, outputCanvas.height);
        }
        
        // Process pose (skeleton draws on top via handlePoseResults)
        if (poseEngine?.isReady && video.readyState >= 2) {
          poseEngine.processFrame(video).catch(() => {});
        }
        
        analysisLoop = requestAnimationFrame(drawFrame);
      };
      drawFrame();
    }
    
    function startVideoOnlyLoop() {
      // Simple loop - just draw video to canvas (no pose analysis)
      let frameCount = 0;
      const drawFrame = () => {
        if (video.readyState >= 2) {
          outputCtx.drawImage(video, 0, 0, outputCanvas.width, outputCanvas.height);
          frameCount++;
          if (frameCount % 60 === 1) {
            console.log(`[Canvas] Drawing frame ${frameCount}, video: ${video.videoWidth}x${video.videoHeight}, canvas: ${outputCanvas.width}x${outputCanvas.height}`);
          }
        } else {
          // Draw colored rectangle to show canvas is working
          outputCtx.fillStyle = '#ff0000';
          outputCtx.fillRect(0, 0, outputCanvas.width, outputCanvas.height);
          outputCtx.fillStyle = '#fff';
          outputCtx.font = '48px Arial';
          outputCtx.fillText('Waiting for video...', 50, 100);
        }
        analysisLoop = requestAnimationFrame(drawFrame);
      };
      
      drawFrame();
    }
    
    function handlePoseResults(results) {
      // Video frame already drawn in analysis loop - just add skeleton
      if (!results.detected) return;
      
      // Draw skeleton on top
      skeletonRenderer.draw(results.landmarks, {
        angles: results.angles,
        centerOfMass: results.centerOfMass
      });
      
      // Calculate score
      if (scoreCalculator) {
        const scoreResult = scoreCalculator.process(results);
        
        const scoreEl = document.getElementById('liveScore');
        scoreEl.textContent = scoreResult.score;
        const gradeInfo = getGrade(scoreResult.score);
        scoreEl.style.color = gradeInfo.color;
      }
    }
    
    async function registerCamera() {
      await DB.set(`cameras/${camId}`, {
        name: athleteName,
        position,
        movement,
        status: 'ready',
        sessionId: sessionId || null,
        createdAt: Date.now(),
        lastHeartbeat: Date.now()
      });
      
      // Listen for regia
      listenForRegia();
      
      // Listen for commands (sessionId is always 'ark_main')
      const cmdPath = `sessions/${sessionId}/command`;
      console.log('✅ Listening for commands on:', cmdPath);
      
      DB.listen(cmdPath, (data) => {
        console.log('📨 Command listener fired:', data);
        handleCommand(data);
      });
      
      document.getElementById('connInfo').textContent = `Connesso`;
      
      // Listen for regia reload signal - auto reconnect
      let lastRegiaTs = null;
      DB.listen('regiaActive', (data) => {
        if (!data) return;
        
        if (lastRegiaTs === null) {
          lastRegiaTs = data.ts;
          console.log('Initial regia timestamp:', lastRegiaTs);
          return; // First read, just store
        }
        
        // If timestamp changed, regia was reloaded - reconnect
        if (data.ts !== lastRegiaTs) {
          console.log('Regia reloaded - reconnecting camera...');
          lastRegiaTs = data.ts;
          location.reload();
        }
      });
      
      // Heartbeat
      heartbeatInterval = setInterval(async () => {
        const stats = scoreCalculator?.getStats();
        await DB.update(`cameras/${camId}`, { 
          lastHeartbeat: Date.now(),
          stats: stats ? {
            averageScore: stats.averageScore,
            totalReps: stats.totalReps
          } : null
        });
      }, 5000);
      
      // Listen for position updates from regia
      DB.listen(`cameras/${camId}/position`, (newPosition) => {
        if (newPosition && newPosition !== position) {
          position = newPosition;
          athleteName = `Camera ${position}`;
          localStorage.setItem('arkCamera_position', position);
          document.getElementById('nameLabel').textContent = `${athleteName} - ${position}`;
          console.log('📍 Position updated from regia:', position);
        }
      });
      
      console.log('Camera registered:', camId);
    }
    
    function listenForRegia() {
      DB.listen(`cameras/${camId}/regiaOffer`, async (offer) => {
        if (!offer) return;
        
        console.log('Regia offer received');
        
        if (regiaPC) {
          regiaPC.close();
          regiaUnsubscribers.forEach(fn => fn?.());
          regiaUnsubscribers = [];
        }
        regiaCandidates = new Set();
        
        regiaPC = new RTCPeerConnection({ iceServers: ICE_SERVERS });
        
        // Add video stream to regia (direct, no flickering)
        webrtcStream.getTracks().forEach(track => {
          regiaPC.addTrack(track, webrtcStream);
        });
        
        regiaPC.onicecandidate = async (e) => {
          if (e.candidate && !e.candidate.candidate.includes('.local')) {
            const id = `${Date.now()}_${Math.random().toString(36).substr(2, 4)}`;
            await DB.set(`cameras/${camId}/regiaCameraCandidates/${id}`, e.candidate.toJSON());
          }
        };
        
        regiaPC.onconnectionstatechange = () => {
          console.log('Regia connection:', regiaPC.connectionState);
          if (regiaPC.connectionState === 'connected') {
            setStatus('online', 'Streaming');
            document.getElementById('connInfo').textContent = 'Connesso alla regia';
          }
        };
        
        await regiaPC.setRemoteDescription(new RTCSessionDescription(offer));
        
        const answer = await regiaPC.createAnswer();
        await regiaPC.setLocalDescription(answer);
        await DB.set(`cameras/${camId}/regiaAnswer`, { type: answer.type, sdp: answer.sdp });
        
        console.log('Answer sent');
        
        const unsub = DB.listen(`cameras/${camId}/regiaCandidates`, async (cands) => {
          if (!cands || !regiaPC) return;
          for (const [id, cand] of Object.entries(cands)) {
            if (regiaCandidates.has(id)) continue;
            try {
              await regiaPC.addIceCandidate(new RTCIceCandidate(cand));
              regiaCandidates.add(id);
            } catch(e) {}
          }
        });
        regiaUnsubscribers.push(unsub);
      });
    }
    
    let autoStopTimeout = null;
    let lastCommandTimestamp = 0;
    const cameraStartTime = Date.now();
    
    async function handleCommand(cmd) {
      console.log('🎯 handleCommand called with:', cmd);
      if (!cmd) {
        console.log('   (null/undefined - ignoring)');
        return;
      }
      
      // IMPORTANT: Ignore old commands (before camera started or already processed)
      const cmdTime = cmd.timestamp || 0;
      if (cmdTime <= lastCommandTimestamp) {
        console.log('   ⏭️ Skipping old/duplicate command:', cmdTime, '<=', lastCommandTimestamp);
        return;
      }
      if (cmdTime < cameraStartTime - 5000) {
        console.log('   ⏭️ Skipping stale command from before camera started:', cmdTime, '<', cameraStartTime);
        return;
      }
      
      lastCommandTimestamp = cmdTime;
      console.log('📥 Command received:', cmd.action, cmd);
      
      // Update movement if specified
      if (cmd.movement) {
        movement = cmd.movement;
        if (scoreCalculator) {
          scoreCalculator = new ScoreCalculator(movement);
        }
      }
      
      if (cmd.action === 'start' && !isRecording) {
        console.log('▶️ Starting recording from regia command');
        await startRecording();
        
        // Auto-stop after duration (if specified)
        if (cmd.duration) {
          console.log(`⏱️ Auto-stop scheduled in ${cmd.duration}ms`);
          if (autoStopTimeout) clearTimeout(autoStopTimeout);
          autoStopTimeout = setTimeout(async () => {
            console.log('⏱️ Auto-stop triggered');
            await stopRecording();
          }, cmd.duration);
        }
      } else if (cmd.action === 'stop' && isRecording) {
        console.log('⏹ Stopping recording from regia command');
        if (autoStopTimeout) clearTimeout(autoStopTimeout);
        await stopRecording();
      } else if (cmd.action === 'flip') {
        console.log('🔄 Flip camera from regia command');
        await switchCam();
      }
    }
    
    window.toggleRecording = () => {
      if (isRecording) stopRecording();
      else startRecording();
    };
    
    async function startRecording() {
      if (isRecording) return;
      
      isRecording = true;
      recordedChunks = [];
      scoreCalculator?.reset();
      
      // Record canvas stream (with skeleton!) - HIGH QUALITY
      const options = { 
        mimeType: 'video/webm;codecs=vp9,opus',
        videoBitsPerSecond: 8000000  // 8 Mbps for high quality
      };
      if (!MediaRecorder.isTypeSupported(options.mimeType)) {
        options.mimeType = 'video/webm';
      }
      console.log('🎬 Recording quality: 8 Mbps, codec:', options.mimeType);
      
      mediaRecorder = new MediaRecorder(recordingStream, options);
      
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };
      
      mediaRecorder.onstop = uploadRecording;
      
      mediaRecorder.start(1000);
      
      document.getElementById('recIndicator').classList.add('active');
      document.getElementById('timer').classList.add('recording');
      document.getElementById('recBtn').textContent = '⏹ STOP';
      document.getElementById('recBtn').classList.add('btn-danger');
      document.getElementById('positionGuide').classList.add('recording');
      setStatus('recording', 'REC');
      
      recordingStartTime = Date.now();
      timerInterval = setInterval(updateTimer, 100);
      
      await DB.update(`cameras/${camId}`, { status: 'recording', startedAt: recordingStartTime });
    }
    
    async function stopRecording() {
      if (!isRecording || !mediaRecorder) return;
      
      isRecording = false;
      clearInterval(timerInterval);
      
      mediaRecorder.stop();
      
      document.getElementById('recIndicator').classList.remove('active');
      document.getElementById('timer').classList.remove('recording');
      document.getElementById('recBtn').textContent = '⏺ REC';
      document.getElementById('recBtn').classList.remove('btn-danger');
      document.getElementById('positionGuide').classList.remove('recording');
      setStatus('connecting', 'Salvataggio...');
      
      await DB.update(`cameras/${camId}`, { status: 'uploading' });
    }
    
    async function uploadRecording() {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      const stats = scoreCalculator?.getStats() || {};
      const analysisId = `ana_${Date.now()}`;
      const duration = document.getElementById('timer').textContent;
      
      setStatus('connecting', 'Upload video...');
      
      try {
        // Convert blob to base64
        const base64 = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
        
        // Upload to R2
        setStatus('connecting', 'Caricamento...');
        const uploadRes = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            video: base64,
            filename: `${analysisId}_${athleteName.replace(/\s+/g, '_')}`
          })
        });
        
        let videoUrl = null;
        if (uploadRes.ok) {
          const uploadData = await uploadRes.json();
          videoUrl = uploadData.url;
          console.log('Video uploaded:', videoUrl);
        } else {
          console.warn('Upload failed, saving metadata only');
        }
        
        // Prepare full recording data
        const recordingData = {
          analysisId,
          videoUrl,
          athleteName,
          position,
          movement,
          duration,
          size: blob.size,
          timestamp: Date.now(),
          stats: {
            averageScore: stats.averageScore || 0,
            bestScore: stats.bestScore || 0,
            worstScore: stats.worstScore || 0,
            totalReps: stats.totalReps || 0,
            topFaults: stats.topFaults || []
          },
          status: videoUrl ? 'pending_analysis' : 'upload_failed'
        };
        
        // Save to Firebase
        await DB.set(`recordings/${analysisId}`, recordingData);
        
        // Create pending report entry
        await DB.set(`reports/${analysisId}`, {
          status: 'pending',
          athleteName,
          movement,
          duration,
          videoUrl,
          appScore: stats.averageScore || 0,
          totalReps: stats.totalReps || 0,
          createdAt: Date.now()
        });
        
        // Notify Claude for analysis (if video uploaded) - automatic, no prompts
        if (videoUrl) {
          setStatus('connecting', 'Invio per analisi...');
          
          try {
            const notifyRes = await fetch('/api/notify', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                analysisId,
                videoUrl,
                athleteName,
                movement,
                position,
                duration,
                appStats: recordingData.stats,
                reps: recordingData.stats?.totalReps || 1,
                load: 'BW', // TODO: add load input
                cameraView: position
              })
            });
            console.log('Notify sent:', await notifyRes.json());
          } catch (e) {
            console.warn('Notify failed:', e);
          }
        }
        
        // Update camera status
        await DB.update(`cameras/${camId}`, { 
          status: 'uploaded', 
          analysisId,
          videoUrl,
          stats: recordingData.stats 
        });
        
        setStatus('online', '✅ Inviato!');
        console.log('✅ Recording complete, notified via Telegram');
        
      } catch (e) {
        console.error('Upload error:', e);
        setStatus('offline', 'Errore upload');
        alert('❌ Errore upload: ' + e.message);
      }
      
      document.getElementById('timer').textContent = '00:00';
      recordingStartTime = null;
    }
    
    window.switchCam = async () => {
      if (isRecording) {
        alert('Non puoi cambiare durante la registrazione');
        return;
      }
      
      facingMode = facingMode === 'environment' ? 'user' : 'environment';
      
      stream.getTracks().forEach(t => t.stop());
      
      stream = await navigator.mediaDevices.getUserMedia({
        video: { 
          facingMode, 
          width: { ideal: 1920, min: 1280 }, 
          height: { ideal: 1080, min: 720 },
          frameRate: { ideal: 30, min: 24 }
        },
        audio: true
      });
      
      video.srcObject = stream;
      await video.play();
      
      outputCanvas.width = video.videoWidth;
      outputCanvas.height = video.videoHeight;
      
      // Update streams after camera flip - use canvas (skeleton only)
      recordingStream = outputCanvas.captureStream(30);
      const audioTrack = stream.getAudioTracks()[0];
      if (audioTrack) recordingStream.addTrack(audioTrack);
      webrtcStream = recordingStream;
      
      // Replace tracks in WebRTC with canvas stream (skeleton only)
      if (regiaPC) {
        const newVideoTrack = recordingStream.getVideoTracks()[0];
        const videoSender = regiaPC.getSenders().find(s => s.track?.kind === 'video');
        const audioSender = regiaPC.getSenders().find(s => s.track?.kind === 'audio');
        if (videoSender) videoSender.replaceTrack(newVideoTrack);
        if (audioSender && audioTrack) audioSender.replaceTrack(audioTrack);
      }
    };
    
    window.stop = async () => {
      if (isRecording) {
        if (!confirm('Registrazione in corso. Vuoi uscire?')) return;
        await stopRecording();
      }
      
      cancelAnimationFrame(analysisLoop);
      clearInterval(heartbeatInterval);
      regiaUnsubscribers.forEach(fn => fn?.());
      regiaPC?.close();
      stream?.getTracks().forEach(t => t.stop());
      if (camId) await DB.remove(`cameras/${camId}`);
      location.href = 'index.html';
    };
    
    window.addEventListener('pagehide', () => {
      if (camId) DB.remove(`cameras/${camId}`);
    });
  </script>
</body>
</html>
