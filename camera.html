<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>📱 ARK Camera - Registrazione</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body { background: #000; overflow: hidden; height: 100vh; }
    .container { height: 100%; display: flex; flex-direction: column; padding: 0; max-width: 100%; }
    
    video { 
      flex: 1; 
      width: 100%; 
      object-fit: cover;
    }
    
    .overlay {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 15px 20px;
      background: linear-gradient(rgba(0,0,0,0.8), transparent);
      display: flex; justify-content: space-between; align-items: center;
    }
    
    .status { display: flex; align-items: center; gap: 8px; font-size: 14px; }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; }
    .status-dot.ready { background: #2ecc71; }
    .status-dot.recording { background: #e94560; animation: pulse 1s infinite; }
    .status-dot.waiting { background: #f1c40f; }
    
    @keyframes pulse { 50% { opacity: 0.5; } }
    
    .cam-label { 
      background: var(--accent); 
      padding: 6px 14px; 
      border-radius: 20px; 
      font-size: 13px; 
      font-weight: 600;
      color: #000;
    }
    
    .rec-indicator {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #e94560;
      padding: 10px 30px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 18px;
      display: none;
      animation: pulse 1s infinite;
    }
    
    .rec-indicator.active { display: flex; align-items: center; gap: 10px; }
    
    .bottom-panel {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.95));
      padding: 30px 20px 30px;
    }
    
    .info { text-align: center; margin-bottom: 20px; }
    .info .label { font-size: 11px; color: var(--text-secondary); margin-bottom: 5px; }
    .info .value { font-size: 24px; font-weight: 700; color: var(--accent); }
    .info .sub { font-size: 13px; color: #888; margin-top: 8px; }
    
    .timer {
      font-size: 48px;
      font-weight: 800;
      font-family: monospace;
      text-align: center;
      margin-bottom: 20px;
      color: #fff;
    }
    
    .timer.recording { color: #e94560; }
    
    .controls { display: flex; gap: 10px; justify-content: center; }
    
    /* Setup Screen */
    .setup {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #0a0a0f, #1a1a2e);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 30px; z-index: 100;
    }
    .setup.hidden { display: none; }
    .setup .logo { font-size: 70px; margin-bottom: 15px; }
    .setup h1 { font-size: 26px; margin-bottom: 8px; }
    .setup p { color: var(--text-secondary); font-size: 14px; margin-bottom: 30px; text-align: center; }
    
    .setup .form-group { width: 100%; max-width: 280px; margin-bottom: 15px; }
    .setup input, .setup select {
      width: 100%; 
      padding: 15px; 
      border-radius: 12px;
      border: 2px solid var(--border); 
      background: rgba(255,255,255,0.05);
      color: white; 
      font-size: 16px; 
      text-align: center;
    }
    .setup .btn { width: 100%; max-width: 280px; padding: 15px; font-size: 16px; }
    
    /* Waiting for command overlay */
    .waiting-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    .waiting-overlay.hidden { display: none; }
    .waiting-overlay .icon { font-size: 60px; margin-bottom: 20px; }
    .waiting-overlay h2 { font-size: 24px; margin-bottom: 10px; }
    .waiting-overlay p { color: #888; }
  </style>
</head>
<body>
  <!-- Setup Screen -->
  <div class="setup" id="setup">
    <div class="logo">📱</div>
    <h1>ARK Camera</h1>
    <p>Registrazione video per analisi movimento</p>
    
    <div class="form-group">
      <input type="text" id="athleteName" placeholder="👤 Nome Atleta" required>
    </div>
    
    <div class="form-group">
      <select id="position">
        <option value="frontale">📍 Frontale</option>
        <option value="laterale">📍 Laterale</option>
        <option value="posteriore">📍 Posteriore</option>
        <option value="altro">📍 Altro</option>
      </select>
    </div>
    
    <div class="form-group">
      <select id="quality">
        <option value="1080">📹 1080p (Full HD)</option>
        <option value="720" selected>📹 720p (HD)</option>
        <option value="480">📹 480p (SD)</option>
      </select>
    </div>
    
    <button class="btn btn-primary" onclick="startSetup()">🎬 Prepara Camera</button>
  </div>
  
  <!-- Camera View -->
  <div class="container">
    <video id="video" autoplay playsinline muted></video>
    
    <div class="overlay">
      <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Pronto</span>
      </div>
      <div class="cam-label" id="nameLabel">Camera</div>
      <a href="index.html" style="background:rgba(255,255,255,0.2);padding:6px 12px;border-radius:20px;text-decoration:none;color:white;font-size:12px;">🏠</a>
    </div>
    
    <div class="rec-indicator" id="recIndicator">
      <span>⏺</span> REC
    </div>
    
    <!-- Waiting for START command -->
    <div class="waiting-overlay" id="waitingOverlay">
      <div class="icon">⏳</div>
      <h2>In attesa</h2>
      <p id="waitingText">Attendo comando START dalla regia...</p>
    </div>
    
    <div class="bottom-panel">
      <div class="timer" id="timer">00:00</div>
      
      <div class="info">
        <div class="label">CAMERA ID</div>
        <div class="value" id="camId">---</div>
        <div class="sub" id="sessionInfo">Sessione: --</div>
      </div>
      
      <div class="controls">
        <button class="btn btn-secondary" onclick="switchCamera()">🔄 Flip</button>
        <button class="btn btn-danger" onclick="stopCamera()">⏹️ Esci</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { DB } from './firebase-config.js';
    
    // State
    let camId = null;
    let sessionId = null;
    let athleteName = '';
    let position = '';
    let quality = '720';
    let stream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let facingMode = 'environment';
    let isRecording = false;
    let recordingStartTime = null;
    let timerInterval = null;
    
    // Elements
    const video = document.getElementById('video');
    const timer = document.getElementById('timer');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const recIndicator = document.getElementById('recIndicator');
    const waitingOverlay = document.getElementById('waitingOverlay');
    
    function setStatus(status, text) {
      statusDot.className = 'status-dot ' + status;
      statusText.textContent = text;
    }
    
    function updateTimer() {
      if (!recordingStartTime) return;
      const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
      const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
      const sec = (elapsed % 60).toString().padStart(2, '0');
      timer.textContent = `${min}:${sec}`;
    }
    
    window.startSetup = async () => {
      athleteName = document.getElementById('athleteName').value.trim() || 'Atleta';
      position = document.getElementById('position').value;
      quality = document.getElementById('quality').value;
      
      const res = {
        '1080': { w: 1920, h: 1080 },
        '720': { w: 1280, h: 720 },
        '480': { w: 854, h: 480 }
      }[quality];
      
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { 
            facingMode, 
            width: { ideal: res.w }, 
            height: { ideal: res.h }, 
            frameRate: { ideal: 30 } 
          },
          audio: true // Include audio for analysis
        });
        
        video.srcObject = stream;
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('nameLabel').textContent = `${athleteName} - ${position}`;
        
        // Wake lock
        if ('wakeLock' in navigator) {
          try { await navigator.wakeLock.request('screen'); } catch(e) {}
        }
        
        // Generate camera ID
        camId = 'cam_' + Math.random().toString(36).substr(2, 8);
        document.getElementById('camId').textContent = camId;
        
        // Register in Firebase and wait for session
        await registerCamera();
        
      } catch (e) {
        alert('Errore camera: ' + e.message);
      }
    };
    
    async function registerCamera() {
      // Register camera as available
      await DB.set(`cameras/${camId}`, {
        name: athleteName,
        position,
        quality,
        status: 'ready',
        createdAt: Date.now()
      });
      
      setStatus('waiting', 'In attesa di sessione...');
      waitingOverlay.classList.remove('hidden');
      
      // Listen for session assignment
      DB.listen(`cameras/${camId}/session`, (data) => {
        if (data && data.sessionId) {
          sessionId = data.sessionId;
          document.getElementById('sessionInfo').textContent = `Sessione: ${sessionId}`;
          document.getElementById('waitingText').textContent = 'Connesso! Attendo START...';
          
          // Listen for recording commands
          listenForCommands();
        }
      });
      
      // Also listen for global commands (broadcast to all cameras)
      DB.listen(`sessions/current/command`, handleCommand);
    }
    
    function listenForCommands() {
      if (!sessionId) return;
      
      DB.listen(`sessions/${sessionId}/command`, handleCommand);
    }
    
    async function handleCommand(cmd) {
      if (!cmd) return;
      
      console.log('Command received:', cmd);
      
      if (cmd.action === 'start' && !isRecording) {
        await startRecording(cmd.movement);
      } else if (cmd.action === 'stop' && isRecording) {
        await stopRecording();
      }
    }
    
    async function startRecording(movement) {
      if (isRecording) return;
      
      isRecording = true;
      recordedChunks = [];
      
      // Setup MediaRecorder
      const options = { mimeType: 'video/webm;codecs=vp9,opus' };
      if (!MediaRecorder.isTypeSupported(options.mimeType)) {
        options.mimeType = 'video/webm';
      }
      
      mediaRecorder = new MediaRecorder(stream, options);
      
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
          recordedChunks.push(e.data);
        }
      };
      
      mediaRecorder.onstop = async () => {
        await uploadRecording();
      };
      
      mediaRecorder.start(1000); // Collect data every second
      
      // Update UI
      waitingOverlay.classList.add('hidden');
      recIndicator.classList.add('active');
      timer.classList.add('recording');
      setStatus('recording', 'Registrazione...');
      
      recordingStartTime = Date.now();
      timerInterval = setInterval(updateTimer, 100);
      
      // Update Firebase status
      await DB.update(`cameras/${camId}`, { status: 'recording', startedAt: recordingStartTime });
    }
    
    async function stopRecording() {
      if (!isRecording || !mediaRecorder) return;
      
      isRecording = false;
      clearInterval(timerInterval);
      
      // Stop recorder (triggers onstop -> uploadRecording)
      mediaRecorder.stop();
      
      // Update UI
      recIndicator.classList.remove('active');
      timer.classList.remove('recording');
      setStatus('waiting', 'Caricamento...');
      waitingOverlay.classList.remove('hidden');
      document.getElementById('waitingText').textContent = 'Caricamento video...';
      
      // Update Firebase status
      await DB.update(`cameras/${camId}`, { status: 'uploading' });
    }
    
    async function uploadRecording() {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      
      // Convert to base64 for Firebase (or use R2 for larger files)
      const reader = new FileReader();
      reader.onloadend = async () => {
        const base64 = reader.result;
        
        // Save video reference
        const videoId = `vid_${Date.now()}`;
        await DB.set(`recordings/${sessionId}/${camId}`, {
          videoId,
          athleteName,
          position,
          duration: timer.textContent,
          size: blob.size,
          timestamp: Date.now(),
          // For small videos, store base64. For large, upload to R2
          data: blob.size < 5 * 1024 * 1024 ? base64 : null, // Max 5MB inline
          status: 'ready'
        });
        
        // If larger than 5MB, upload to R2
        if (blob.size >= 5 * 1024 * 1024) {
          await uploadToR2(blob, videoId);
        }
        
        // Update camera status
        await DB.update(`cameras/${camId}`, { status: 'uploaded', videoId });
        
        // Done - wait for next command
        setStatus('ready', 'Pronto');
        document.getElementById('waitingText').textContent = 'Video caricato! Attendo prossimo comando...';
      };
      
      reader.readAsDataURL(blob);
    }
    
    async function uploadToR2(blob, videoId) {
      try {
        const formData = new FormData();
        formData.append('file', blob, `${videoId}.webm`);
        formData.append('folder', `ark-analisi/${sessionId}`);
        
        const response = await fetch('/api/upload', {
          method: 'POST',
          body: formData
        });
        
        if (response.ok) {
          const { url } = await response.json();
          await DB.update(`recordings/${sessionId}/${camId}`, { videoUrl: url, data: null });
        }
      } catch (e) {
        console.error('R2 upload failed:', e);
        // Keep base64 as fallback
      }
    }
    
    window.switchCamera = async () => {
      if (isRecording) {
        alert('Non puoi cambiare camera durante la registrazione');
        return;
      }
      
      facingMode = facingMode === 'environment' ? 'user' : 'environment';
      
      const res = {
        '1080': { w: 1920, h: 1080 },
        '720': { w: 1280, h: 720 },
        '480': { w: 854, h: 480 }
      }[quality];
      
      stream.getTracks().forEach(t => t.stop());
      
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: res.w }, height: { ideal: res.h } },
        audio: true
      });
      
      video.srcObject = stream;
    };
    
    window.stopCamera = async () => {
      if (isRecording) {
        if (!confirm('Registrazione in corso. Vuoi davvero uscire?')) return;
        await stopRecording();
      }
      
      stream?.getTracks().forEach(t => t.stop());
      if (camId) await DB.remove(`cameras/${camId}`);
      location.href = 'index.html';
    };
    
    // Cleanup on page close
    window.addEventListener('pagehide', () => {
      if (camId) DB.remove(`cameras/${camId}`);
    });
  </script>
</body>
</html>
