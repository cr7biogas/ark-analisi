<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>📋 Report Analisi - ARK Analisi</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <meta property="og:title" content="ARK Analisi - Report">
  <meta property="og:description" content="Analisi posturale del tuo movimento">
  <style>
    .report-header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 30px 20px;
      text-align: center;
      border-radius: var(--radius);
      margin-bottom: 20px;
    }
    
    .report-header .athlete { font-size: 14px; color: #888; margin-bottom: 5px; }
    .report-header h1 { font-size: 28px; margin-bottom: 10px; }
    .report-header .movement { font-size: 18px; color: var(--accent); }
    
    .score-card {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 30px;
      text-align: center;
      margin-bottom: 20px;
    }
    
    .score-card .big-score {
      font-size: 80px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 10px;
    }
    
    .score-card .grade {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 15px;
    }
    
    .score-card .verdict {
      font-size: 18px;
      color: #888;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .stat-box {
      background: var(--bg-secondary);
      padding: 20px;
      border-radius: var(--radius);
      text-align: center;
    }
    
    .stat-box .value { font-size: 32px; font-weight: 800; color: var(--accent); }
    .stat-box .label { font-size: 12px; color: #888; margin-top: 5px; }
    
    .section {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .section h2 {
      font-size: 18px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .comparison-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .comparison-table th, .comparison-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    
    .comparison-table th { color: #888; font-weight: 600; }
    
    .comparison-table .app { color: #3498db; }
    .comparison-table .ai { color: #e94560; }
    .comparison-table .match { color: #2ecc71; }
    .comparison-table .diff { color: #f1c40f; }
    
    .fault-list {
      list-style: none;
      padding: 0;
    }
    
    .fault-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
    }
    
    .fault-item .icon { font-size: 24px; }
    .fault-item .content { flex: 1; }
    .fault-item .name { font-weight: 600; margin-bottom: 4px; }
    .fault-item .desc { color: #888; font-size: 14px; }
    .fault-item .severity { font-size: 12px; padding: 2px 8px; border-radius: 10px; }
    .fault-item .severity.high { background: #e94560; }
    .fault-item .severity.medium { background: #f1c40f; color: #000; }
    .fault-item .severity.low { background: #2ecc71; }
    
    .recommendations {
      list-style: none;
      padding: 0;
    }
    
    .recommendations li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #333;
    }
    
    .recommendations li:last-child { border-bottom: none; }
    .recommendations .icon { font-size: 20px; }
    
    .video-section {
      margin-bottom: 20px;
    }
    
    .video-section video {
      width: 100%;
      border-radius: var(--radius);
    }
    
    .loading {
      text-align: center;
      padding: 60px;
      color: #888;
    }
    
    .loading .spinner {
      font-size: 48px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .error {
      text-align: center;
      padding: 60px;
      color: #e94560;
    }
    
    .pending {
      text-align: center;
      padding: 60px;
    }
    
    .pending .icon { font-size: 60px; margin-bottom: 20px; }
    .pending h2 { margin-bottom: 10px; }
    .pending p { color: #888; }
    
    .share-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back">←</a>
    <h1>📋 Report</h1>
  </div>
  
  <div class="container" id="content">
    <div class="loading" id="loading">
      <div class="spinner">⏳</div>
      <p>Caricamento report...</p>
    </div>
  </div>

  <script type="module">
    import { DB } from './firebase-config.js';
    
    const params = new URLSearchParams(location.search);
    const analysisId = params.get('id');
    
    if (!analysisId) {
      showError('ID analisi mancante');
    } else {
      loadReport(analysisId);
    }
    
    async function loadReport(id) {
      try {
        // Listen for real-time updates
        DB.listen(`reports/${id}`, (report) => {
          if (!report) {
            showPending(id);
            return;
          }
          
          renderReport(report);
        });
      } catch (e) {
        showError('Errore caricamento: ' + e.message);
      }
    }
    
    function showError(msg) {
      document.getElementById('content').innerHTML = `
        <div class="error">
          <div style="font-size:60px;margin-bottom:20px">❌</div>
          <h2>Errore</h2>
          <p>${msg}</p>
        </div>
      `;
    }
    
    function showPending(id) {
      document.getElementById('content').innerHTML = `
        <div class="pending">
          <div class="icon">🔄</div>
          <h2>Analisi in corso...</h2>
          <p>Il tuo video è stato ricevuto ed è in fase di analisi.</p>
          <p style="margin-top:20px;font-size:14px;color:#666">ID: ${id}</p>
          <p style="font-size:13px;color:#555;margin-top:30px">Questa pagina si aggiornerà automaticamente quando l'analisi sarà completata.</p>
        </div>
      `;
    }
    
    function renderReport(report) {
      const gradeColors = {
        'S': '#ffd700', 'A+': '#00d4aa', 'A': '#00d4aa',
        'B+': '#2ecc71', 'B': '#2ecc71', 'C+': '#f1c40f',
        'C': '#f1c40f', 'D': '#e67e22', 'F': '#e94560'
      };
      
      const grade = report.finalGrade || 'C';
      const gradeColor = gradeColors[grade] || '#888';
      
      document.getElementById('content').innerHTML = `
        <div class="report-header">
          <div class="athlete">👤 ${report.athleteName || 'Atleta'}</div>
          <h1>Analisi Movimento</h1>
          <div class="movement">🏋️ ${report.movement || 'Esercizio'}</div>
        </div>
        
        <div class="score-card">
          <div class="big-score" style="color:${gradeColor}">${report.finalScore || '--'}</div>
          <div class="grade" style="color:${gradeColor}">${grade}</div>
          <div class="verdict">${report.verdict || 'Analisi completata'}</div>
        </div>
        
        <div class="stats-grid">
          <div class="stat-box">
            <div class="value">${report.totalReps || 0}</div>
            <div class="label">RIPETIZIONI</div>
          </div>
          <div class="stat-box">
            <div class="value">${report.duration || '--'}</div>
            <div class="label">DURATA</div>
          </div>
          <div class="stat-box">
            <div class="value">${report.appScore || '--'}</div>
            <div class="label">SCORE APP</div>
          </div>
          <div class="stat-box">
            <div class="value">${report.aiScore || '--'}</div>
            <div class="label">SCORE AI</div>
          </div>
        </div>
        
        ${report.videoUrl ? `
        <div class="section video-section">
          <h2>🎥 Video Analizzato</h2>
          <video controls src="${report.videoUrl}"></video>
        </div>
        ` : ''}
        
        <div class="section">
          <h2>⚖️ Confronto App vs AI</h2>
          <table class="comparison-table">
            <tr>
              <th>Metrica</th>
              <th class="app">📱 App</th>
              <th class="ai">🤖 AI</th>
              <th>Match</th>
            </tr>
            ${(report.comparison || []).map(c => `
              <tr>
                <td>${c.metric}</td>
                <td class="app">${c.appValue}</td>
                <td class="ai">${c.aiValue}</td>
                <td class="${c.match ? 'match' : 'diff'}">${c.match ? '✓' : '≠'}</td>
              </tr>
            `).join('')}
          </table>
        </div>
        
        <div class="section">
          <h2>⚠️ Errori Rilevati</h2>
          <ul class="fault-list">
            ${(report.faults || []).map(f => `
              <li class="fault-item">
                <span class="icon">${f.icon || '⚠️'}</span>
                <div class="content">
                  <div class="name">${f.name}</div>
                  <div class="desc">${f.description}</div>
                </div>
                <span class="severity ${f.severity || 'medium'}">${f.severity || 'medio'}</span>
              </li>
            `).join('') || '<li style="padding:20px;text-align:center;color:#888">Nessun errore significativo rilevato 🎉</li>'}
          </ul>
        </div>
        
        <div class="section">
          <h2>💡 Raccomandazioni</h2>
          <ul class="recommendations">
            ${(report.recommendations || []).map(r => `
              <li>
                <span class="icon">${r.icon || '💡'}</span>
                <span>${r.text}</span>
              </li>
            `).join('') || '<li><span class="icon">✅</span><span>Continua così! Buona esecuzione.</span></li>'}
          </ul>
        </div>
        
        <div class="section">
          <h2>📝 Note dell'Analista</h2>
          <p style="color:#ccc;line-height:1.6">${report.aiNotes || 'Nessuna nota aggiuntiva.'}</p>
        </div>
        
        <div class="share-buttons">
          <button class="btn btn-secondary" onclick="copyLink()">📋 Copia Link</button>
          <button class="btn" style="background:#25D366" onclick="shareWhatsApp()">📱 WhatsApp</button>
        </div>
        
        <p style="text-align:center;color:#666;font-size:12px;margin-top:30px">
          Analisi completata: ${report.completedAt ? new Date(report.completedAt).toLocaleString('it-IT') : 'N/A'}
        </p>
      `;
    }
    
    window.copyLink = () => {
      navigator.clipboard.writeText(location.href);
      alert('✅ Link copiato!');
    };
    
    window.shareWhatsApp = () => {
      const text = '📋 Guarda il mio report di analisi movimento:\n\n';
      window.open(`https://wa.me/?text=${encodeURIComponent(text + location.href)}`, '_blank');
    };
  </script>
</body>
</html>
