<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>🎬 Regia - ARK Analisi</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      min-height: calc(100vh - 70px);
    }
    
    @media (max-width: 900px) {
      .main-layout { grid-template-columns: 1fr; }
    }
    
    .control-panel {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .timer-display {
      font-size: 48px;
      font-weight: 800;
      font-family: monospace;
    }
    
    .timer-display.recording { color: #e94560; }
    
    .control-buttons { display: flex; gap: 10px; }
    
    .big-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      font-size: 32px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .big-btn.start { background: linear-gradient(135deg, #2ecc71, #27ae60); }
    .big-btn.stop { background: linear-gradient(135deg, #e94560, #c0392b); }
    .big-btn:hover { transform: scale(1.1); }
    .big-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    .camera-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 15px;
    }
    
    .camera-slot {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      overflow: hidden;
      border: 3px solid transparent;
    }
    
    .camera-slot.connected { border-color: #2ecc71; }
    .camera-slot.recording { border-color: #e94560; animation: pulse-border 1s infinite; }
    
    @keyframes pulse-border { 50% { border-color: #c0392b; } }
    
    .camera-slot .slot-header {
      padding: 10px 15px;
      background: var(--bg-card);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .camera-slot .slot-title {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .camera-slot .video-area {
      aspect-ratio: 16/9;
      background: #000;
      position: relative;
    }
    
    .camera-slot video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .camera-slot .no-video {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #666;
    }
    
    .camera-slot .no-video .icon { font-size: 48px; margin-bottom: 10px; }
    
    .camera-slot .stats-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.85);
      padding: 8px 15px;
      border-radius: var(--radius);
      text-align: center;
    }
    
    .camera-slot .stats-badge .score {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
    }
    
    .camera-slot .stats-badge .label {
      font-size: 10px;
      color: #888;
    }
    
    .empty-cameras {
      text-align: center;
      padding: 60px 40px;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border-radius: var(--radius);
    }
    
    .empty-cameras .icon { font-size: 60px; margin-bottom: 15px; }
    
    .sidebar {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 20px;
    }
    
    .sidebar h3 {
      font-size: 15px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .link-box {
      background: var(--bg-card);
      padding: 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 15px;
    }
    
    .link-box input { font-size: 11px; margin-bottom: 8px; }
    .link-box .btn { width: 100%; margin-bottom: 5px; }
    
    .qr-box {
      text-align: center;
      padding: 15px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      margin-bottom: 15px;
    }
    
    .qr-box .qr-placeholder {
      width: 150px;
      height: 150px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      font-size: 40px;
    }
    
    .qr-box .qr-text { font-size: 12px; color: #888; margin-top: 10px; }
    
    .status-list { margin-top: 15px; }
    
    .status-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
    }
    
    .status-item .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    
    .status-item .dot.ready { background: #2ecc71; }
    .status-item .dot.recording { background: #e94560; animation: pulse 1s infinite; }
    .status-item .dot.connecting { background: #f1c40f; animation: pulse 1s infinite; }
    
    @keyframes pulse { 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back">←</a>
    <h1>🎬 Regia</h1>
    <span style="margin-left:auto;color:var(--text-secondary);font-size:13px">
      <span id="cameraCount">0</span> camere
    </span>
  </div>
  
  <div class="container">
    <div class="main-layout">
      <div class="main-content">
        <div class="control-panel">
          <div>
            <select id="movementSelect" style="padding:10px 15px;border-radius:8px;background:var(--bg-card);color:#fff;border:1px solid #444;">
              <option value="squat">🏋️ Squat</option>
              <option value="deadlift">💪 Deadlift</option>
              <option value="press">🔥 Press</option>
              <option value="pullup">🔥 Pull-up</option>
              <option value="clean">🏋️ Clean</option>
              <option value="snatch">🏋️ Snatch</option>
              <option value="plank">🧘 Plank</option>
            </select>
          </div>
          
          <div class="timer-display" id="timer">00:00</div>
          
          <div class="control-buttons">
            <button class="big-btn start" id="startBtn" onclick="startRecording()" disabled>▶️</button>
            <button class="big-btn stop" id="stopBtn" onclick="stopRecording()" disabled>⏹</button>
          </div>
        </div>
        
        <div id="cameraContainer">
          <div class="empty-cameras" id="emptyState">
            <div class="icon">📱</div>
            <h3>Nessuna camera connessa</h3>
            <p>Scansiona il QR code con i telefoni per connetterli</p>
          </div>
          
          <div class="camera-grid" id="cameraGrid" style="display:none"></div>
        </div>
      </div>
      
      <div class="sidebar">
        <div>
          <h3>📱 Connetti Camera</h3>
          <div class="qr-box">
            <div class="qr-placeholder">📱</div>
            <div class="qr-text">Condividi il link qui sotto</div>
          </div>
          <div class="link-box">
            <input type="text" id="cameraLink" readonly>
            <button class="btn btn-secondary" onclick="copyLink()">📋 Copia</button>
            <button class="btn" style="background:#25D366" onclick="shareLink()">📱 WhatsApp</button>
          </div>
        </div>
        
        <div>
          <h3>📊 Camere</h3>
          <div class="status-list" id="statusList">
            <p style="color:#666;font-size:13px;text-align:center">In attesa...</p>
          </div>
          <button class="btn btn-secondary" onclick="cleanOfflineCameras()" style="width:100%;margin-top:10px;font-size:12px">🧹 Pulisci Offline</button>
          <button class="btn btn-secondary" onclick="newSession()" style="width:100%;margin-top:5px;font-size:12px">🔄 Nuova Sessione</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { DB } from './firebase-config.js';
    
    const ICE_SERVERS = [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'stun:stun.cloudflare.com:3478' },
      { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
    ];
    
    // State - persist sessionId across reloads
    let sessionId = localStorage.getItem('arkAnalisi_sessionId');
    if (!sessionId) {
      sessionId = 'ses_' + Date.now().toString(36);
      localStorage.setItem('arkAnalisi_sessionId', sessionId);
    }
    console.log('Session ID:', sessionId);
    const cameras = new Map();
    let isRecording = false;
    let recordingStartTime = null;
    let timerInterval = null;
    let globalMovement = 'squat';
    
    // Movement select
    const movementSelect = document.getElementById('movementSelect');
    movementSelect.addEventListener('change', () => {
      globalMovement = movementSelect.value;
    });
    
    // Camera link
    const cameraUrl = `${location.origin}/camera.html?s=${sessionId}`;
    document.getElementById('cameraLink').value = cameraUrl;
    
    // Signal cameras to reconnect when regia loads
    const regiaLoadTime = Date.now();
    DB.set('regiaActive', { ts: regiaLoadTime, sessionId });
    console.log('Regia active signal sent:', regiaLoadTime);
    
    window.copyLink = () => {
      navigator.clipboard.writeText(cameraUrl);
      alert('✅ Link copiato!');
    };
    
    window.shareLink = () => {
      const text = '📱 Connettiti come camera per analisi:\n\n';
      window.open(`https://wa.me/?text=${encodeURIComponent(text + cameraUrl)}`, '_blank');
    };
    
    // Listen for cameras (filter stale ones)
    const STALE_THRESHOLD = 30000; // 30 seconds
    
    DB.listen('cameras', async (data) => {
      const currentIds = new Set(cameras.keys());
      const newData = data || {};
      const now = Date.now();
      
      for (const [id, cam] of Object.entries(newData)) {
        // Skip stale cameras (no heartbeat in 30s)
        const lastHeartbeat = cam.lastHeartbeat || cam.createdAt || 0;
        if (now - lastHeartbeat > STALE_THRESHOLD) {
          // Auto-remove stale camera from Firebase
          DB.remove(`cameras/${id}`).catch(() => {});
          continue;
        }
        
        if (!cameras.has(id)) {
          cameras.set(id, { info: cam, pc: null, stream: null });
          await createCameraSlot(id, cam);
          await connectToCamera(id);
        } else {
          cameras.get(id).info = cam;
          updateCameraStatus(id, cam);
        }
      }
      
      for (const id of currentIds) {
        if (!newData[id]) {
          removeCameraSlot(id);
          cameras.delete(id);
        }
      }
      
      updateUI();
    });
    
    // Manual cleanup function
    window.cleanOfflineCameras = async () => {
      const allCameras = await DB.get('cameras');
      if (!allCameras) return;
      
      const now = Date.now();
      let removed = 0;
      
      for (const [id, cam] of Object.entries(allCameras)) {
        const lastHeartbeat = cam.lastHeartbeat || cam.createdAt || 0;
        if (now - lastHeartbeat > STALE_THRESHOLD) {
          await DB.remove(`cameras/${id}`);
          removed++;
        }
      }
      
      alert(`🧹 Rimosse ${removed} camere offline`);
    };
    
    // New session function
    window.newSession = async () => {
      if (!confirm('Creare nuova sessione? Le camere si ricaricheranno.')) return;
      
      // Signal all cameras to reload
      await DB.set('globalRefresh', { timestamp: Date.now() });
      
      localStorage.removeItem('arkAnalisi_sessionId');
      location.reload();
    };
    
    function updateUI() {
      const count = cameras.size;
      document.getElementById('cameraCount').textContent = count;
      document.getElementById('emptyState').style.display = count === 0 ? 'block' : 'none';
      document.getElementById('cameraGrid').style.display = count > 0 ? 'grid' : 'none';
      document.getElementById('startBtn').disabled = count === 0;
      
      const statusList = document.getElementById('statusList');
      if (count === 0) {
        statusList.innerHTML = '<p style="color:#666;font-size:13px;text-align:center">In attesa...</p>';
      } else {
        statusList.innerHTML = Array.from(cameras.entries()).map(([id, cam]) => {
          const status = cam.info?.status || 'connecting';
          const statusClass = status === 'recording' ? 'recording' : status === 'ready' ? 'ready' : 'connecting';
          return `
            <div class="status-item">
              <span class="dot ${statusClass}"></span>
              <span style="flex:1">${cam.info?.name || 'Camera'}</span>
              <span style="color:#888;font-size:12px">${cam.info?.position || ''}</span>
            </div>
          `;
        }).join('');
      }
    }
    
    async function createCameraSlot(camId, info) {
      const grid = document.getElementById('cameraGrid');
      
      const slot = document.createElement('div');
      slot.className = 'camera-slot';
      slot.id = `slot-${camId}`;
      slot.innerHTML = `
        <div class="slot-header">
          <span class="slot-title">
            <span class="status-dot connecting" id="dot-${camId}"></span>
            ${info.name || 'Camera'}
          </span>
          <span style="color:#888;font-size:12px">${info.position || ''}</span>
        </div>
        <div class="video-area">
          <video id="video-${camId}" autoplay playsinline muted></video>
          <div class="no-video" id="novideo-${camId}">
            <div class="icon">📡</div>
            <span>Connessione...</span>
          </div>
          <div class="stats-badge" id="stats-${camId}" style="display:none">
            <div class="score" id="score-${camId}">--</div>
            <div class="label">SCORE</div>
          </div>
        </div>
      `;
      
      grid.appendChild(slot);
    }
    
    function removeCameraSlot(camId) {
      const cam = cameras.get(camId);
      if (cam?.pc) cam.pc.close();
      document.getElementById(`slot-${camId}`)?.remove();
    }
    
    function updateCameraStatus(camId, info) {
      const dot = document.getElementById(`dot-${camId}`);
      const slot = document.getElementById(`slot-${camId}`);
      const scoreEl = document.getElementById(`score-${camId}`);
      const statsEl = document.getElementById(`stats-${camId}`);
      
      if (dot) {
        dot.className = 'status-dot ' + (info.status === 'recording' ? 'recording' : 'ready');
      }
      if (slot) {
        slot.classList.toggle('recording', info.status === 'recording');
        slot.classList.toggle('connected', info.status === 'ready' || info.status === 'recording');
      }
      
      // Show score from camera (camera does the analysis)
      if (info.stats?.averageScore !== undefined && statsEl) {
        statsEl.style.display = 'block';
        scoreEl.textContent = Math.round(info.stats.averageScore);
      }
    }
    
    async function connectToCamera(camId) {
      const cam = cameras.get(camId);
      if (!cam) return;
      
      const video = document.getElementById(`video-${camId}`);
      const noVideo = document.getElementById(`novideo-${camId}`);
      
      if (cam.pc) {
        cam.pc.close();
        cam.pc = null;
      }
      
      cam.unsubscribers = cam.unsubscribers || [];
      cam.unsubscribers.forEach(fn => fn?.());
      cam.unsubscribers = [];
      cam.addedCandidates = new Set();
      
      try {
        await DB.remove(`cameras/${camId}/regiaOffer`);
        await DB.remove(`cameras/${camId}/regiaCandidates`);
      } catch(e) {}
      
      await new Promise(r => setTimeout(r, 100));
      
      const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
      cam.pc = pc;
      
      pc.ontrack = (e) => {
        const stream = e.streams[0];
        const tracks = stream?.getTracks() || [];
        console.log(`[${camId}] ontrack:`, {
          hasStream: !!stream,
          trackCount: tracks.length,
          tracks: tracks.map(t => ({ kind: t.kind, enabled: t.enabled, muted: t.muted, readyState: t.readyState }))
        });
        
        if (!stream || tracks.length === 0) {
          console.error(`[${camId}] No stream or tracks!`);
          return;
        }
        
        cam.stream = stream;
        
        // Get elements dynamically
        const videoEl = document.getElementById(`video-${camId}`);
        const noVideoEl = document.getElementById(`novideo-${camId}`);
        
        if (!videoEl) {
          console.error(`[${camId}] Video element not found in DOM!`);
          return;
        }
        
        console.log(`[${camId}] Setting srcObject on video element`, { 
          videoElExists: !!videoEl,
          videoElParent: videoEl.parentElement?.id,
          videoElInDOM: document.body.contains(videoEl)
        });
        
        videoEl.srcObject = stream;
        noVideoEl.style.display = 'none';
        
        videoEl.onloadedmetadata = () => {
          console.log(`[${camId}] Video metadata loaded:`, {
            width: videoEl.videoWidth,
            height: videoEl.videoHeight,
            duration: videoEl.duration
          });
        };
        
        // Force play
        videoEl.muted = true;
        videoEl.play().then(() => {
          console.log(`[${camId}] ✅ Video playing!`);
          document.getElementById(`slot-${camId}`)?.classList.add('connected');
          document.getElementById(`dot-${camId}`).className = 'status-dot ready';
        }).catch(err => {
          console.error(`[${camId}] ❌ Play failed:`, err.name, err.message);
        });
      };
      
      pc.onicecandidate = async (e) => {
        if (e.candidate && !e.candidate.candidate.includes('.local')) {
          const id = `${Date.now()}_${Math.random().toString(36).substr(2, 4)}`;
          await DB.set(`cameras/${camId}/regiaCandidates/${id}`, e.candidate.toJSON());
        }
      };
      
      pc.onconnectionstatechange = () => {
        console.log(`[${camId}] Connection: ${pc.connectionState}`);
        if (pc.connectionState === 'failed') {
          setTimeout(() => connectToCamera(camId), 2000);
        }
      };
      
      pc.oniceconnectionstatechange = () => {
        console.log(`[${camId}] ICE: ${pc.iceConnectionState}`);
        if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
          const noVideoEl = document.getElementById(`novideo-${camId}`);
          if (noVideoEl) noVideoEl.style.display = 'none';
          document.getElementById(`slot-${camId}`)?.classList.add('connected');
        }
      };
      
      pc.onicegatheringstatechange = () => {
        console.log(`[${camId}] ICE gathering: ${pc.iceGatheringState}`);
      };
      
      pc.addTransceiver('video', { direction: 'recvonly' });
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      // Add timestamp to force Firebase to notify even if SDP is same
      await DB.set(`cameras/${camId}/regiaOffer`, { type: offer.type, sdp: offer.sdp, ts: Date.now() });
      
      console.log(`[${camId}] Offer sent (ts: ${Date.now()})`);
      
      const unsubAnswer = DB.listen(`cameras/${camId}/regiaAnswer`, async (answer) => {
        if (!answer || !pc || pc.signalingState === 'closed' || pc.signalingState === 'stable') return;
        
        try {
          await pc.setRemoteDescription(new RTCSessionDescription(answer));
          console.log(`[${camId}] Answer received`);
          
          const unsubCands = DB.listen(`cameras/${camId}/regiaCameraCandidates`, async (cands) => {
            if (!cands || !pc || pc.connectionState === 'closed') return;
            for (const [id, cand] of Object.entries(cands)) {
              if (cam.addedCandidates.has(id)) continue;
              try {
                await pc.addIceCandidate(new RTCIceCandidate(cand));
                cam.addedCandidates.add(id);
              } catch(e) {}
            }
          });
          cam.unsubscribers.push(unsubCands);
        } catch(e) {
          console.warn(`[${camId}] Answer error:`, e);
        }
      });
      cam.unsubscribers.push(unsubAnswer);
    }
    
    // Recording controls
    window.startRecording = async () => {
      if (cameras.size === 0) return;
      
      isRecording = true;
      recordingStartTime = Date.now();
      
      console.log('Sending START command to:', `sessions/${sessionId}/command`);
      await DB.set(`sessions/${sessionId}/command`, {
        action: 'start',
        movement: globalMovement,
        timestamp: Date.now()
      });
      console.log('START command sent');
      
      document.getElementById('startBtn').disabled = true;
      document.getElementById('stopBtn').disabled = false;
      document.getElementById('timer').classList.add('recording');
      
      timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
        const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
        const sec = (elapsed % 60).toString().padStart(2, '0');
        document.getElementById('timer').textContent = `${min}:${sec}`;
      }, 100);
    };
    
    window.stopRecording = async () => {
      if (!isRecording) return;
      
      isRecording = false;
      clearInterval(timerInterval);
      
      await DB.set(`sessions/${sessionId}/command`, {
        action: 'stop',
        timestamp: Date.now()
      });
      
      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
      document.getElementById('timer').classList.remove('recording');
      
      setTimeout(() => {
        alert(`✅ Registrazione completata!\n\nCamere: ${cameras.size}\nDurata: ${document.getElementById('timer').textContent}`);
      }, 1000);
    };
  </script>
</body>
</html>
