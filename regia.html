<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>🎬 Regia - ARK Analisi</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 20px;
      min-height: calc(100vh - 70px);
    }
    
    @media (max-width: 900px) {
      .main-layout { grid-template-columns: 1fr; }
    }
    
    /* Control Panel */
    .control-panel {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: var(--radius);
      padding: 30px;
      text-align: center;
      margin-bottom: 20px;
    }
    
    .big-button {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: none;
      font-size: 48px;
      cursor: pointer;
      transition: all 0.3s;
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .big-button.start {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      box-shadow: 0 10px 40px rgba(46, 204, 113, 0.4);
    }
    
    .big-button.stop {
      background: linear-gradient(135deg, #e94560, #c0392b);
      box-shadow: 0 10px 40px rgba(233, 69, 96, 0.4);
      animation: pulse-red 1s infinite;
    }
    
    .big-button:hover { transform: scale(1.05); }
    .big-button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 10px 40px rgba(233, 69, 96, 0.4); }
      50% { box-shadow: 0 10px 60px rgba(233, 69, 96, 0.6); }
    }
    
    .timer-display {
      font-size: 72px;
      font-weight: 800;
      font-family: monospace;
      margin: 20px 0;
    }
    
    .timer-display.recording { color: #e94560; }
    
    .status-text {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }
    
    /* Camera Grid */
    .camera-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }
    
    .camera-card {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      border: 2px solid transparent;
    }
    
    .camera-card.ready { border-color: #2ecc71; }
    .camera-card.recording { border-color: #e94560; background: rgba(233, 69, 96, 0.1); }
    .camera-card.uploading { border-color: #f1c40f; }
    .camera-card.uploaded { border-color: #3498db; }
    
    .camera-card .icon { font-size: 36px; }
    .camera-card .info { flex: 1; }
    .camera-card .name { font-weight: 600; font-size: 16px; }
    .camera-card .meta { color: var(--text-secondary); font-size: 13px; }
    .camera-card .status-badge {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .camera-card .status-badge.ready { background: #2ecc71; color: #000; }
    .camera-card .status-badge.recording { background: #e94560; }
    .camera-card .status-badge.uploading { background: #f1c40f; color: #000; }
    .camera-card .status-badge.uploaded { background: #3498db; }
    
    .empty-cameras {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }
    
    /* Sidebar */
    .sidebar {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 20px;
    }
    
    .sidebar h3 {
      font-size: 16px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .link-box {
      background: var(--bg-card);
      padding: 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 15px;
    }
    
    .link-box input {
      font-size: 12px;
      margin-bottom: 10px;
    }
    
    .link-box .btn { width: 100%; }
    
    .movement-select {
      margin-bottom: 20px;
    }
    
    .athlete-input {
      margin-bottom: 20px;
    }
    
    /* Session History */
    .session-item {
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      padding: 15px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .session-item:hover { background: rgba(0, 212, 170, 0.1); }
    
    .session-item .time { color: var(--text-secondary); font-size: 12px; }
    .session-item .info { margin-top: 5px; }
    
    /* Results */
    .results-panel {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    
    .result-card {
      background: linear-gradient(135deg, rgba(0, 212, 170, 0.1), rgba(0, 153, 255, 0.1));
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 15px;
    }
    
    .result-card h4 { margin-bottom: 10px; }
    .result-card .link { 
      word-break: break-all; 
      color: var(--accent); 
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back">←</a>
    <h1>🎬 Regia</h1>
    <span id="sessionId" style="margin-left:auto;color:var(--text-secondary);font-size:13px"></span>
  </div>
  
  <div class="container">
    <div class="main-layout">
      <div class="main-content">
        <!-- Control Panel -->
        <div class="control-panel">
          <div class="status-text" id="statusText">Configura la sessione e connetti le camere</div>
          
          <div class="timer-display" id="timer">00:00</div>
          
          <button class="big-button start" id="mainButton" onclick="toggleRecording()" disabled>
            ▶️
          </button>
          
          <p style="color:#888;font-size:14px" id="buttonHint">Connetti almeno una camera per iniziare</p>
        </div>
        
        <!-- Connected Cameras -->
        <div class="card">
          <h2>📱 Camere Connesse (<span id="cameraCount">0</span>)</h2>
          <div class="camera-grid" id="cameraGrid">
            <div class="empty-cameras">
              <p>📱 Nessuna camera connessa</p>
              <p style="font-size:13px;margin-top:10px">Condividi il link camera con i telefoni</p>
            </div>
          </div>
        </div>
        
        <!-- Recent Sessions -->
        <div class="card" id="sessionsCard" style="display:none">
          <h2>📋 Sessioni Recenti</h2>
          <div id="sessionsList"></div>
        </div>
      </div>
      
      <div class="sidebar">
        <div>
          <h3>⚙️ Configurazione</h3>
          
          <div class="athlete-input">
            <label style="font-size:13px;color:#888;display:block;margin-bottom:6px">Nome Atleta</label>
            <input type="text" id="athleteName" placeholder="Es: Mario Rossi">
          </div>
          
          <div class="movement-select">
            <label style="font-size:13px;color:#888;display:block;margin-bottom:6px">Movimento</label>
            <select id="movementSelect">
              <option value="">-- Seleziona Movimento --</option>
            </select>
          </div>
        </div>
        
        <div>
          <h3>📱 Link Camera</h3>
          <div class="link-box">
            <input type="text" id="cameraLink" readonly value="">
            <button class="btn btn-secondary" onclick="copyLink()">📋 Copia Link</button>
            <button class="btn btn-secondary mt-1" onclick="shareLink()" style="background:#25D366">📱 WhatsApp</button>
            <button class="btn btn-secondary mt-1" onclick="showQR()">📲 QR Code</button>
          </div>
        </div>
        
        <div class="results-panel" id="resultsPanel" style="display:none">
          <h3>📊 Risultati</h3>
          <div id="resultsList"></div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- QR Modal -->
  <div id="qrModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:#fff;padding:30px;border-radius:20px;text-align:center;">
      <img id="qrImage" style="width:250px;height:250px;">
      <p style="margin-top:15px;color:#000">Scansiona per aprire la camera</p>
      <button onclick="document.getElementById('qrModal').style.display='none'" style="margin-top:15px;padding:10px 30px;border-radius:10px;border:none;background:#333;color:#fff;cursor:pointer">Chiudi</button>
    </div>
  </div>

  <script type="module">
    import { DB } from './firebase-config.js';
    import { getAllMovements } from './lib/movement-db.js';
    
    // State
    let sessionId = null;
    let cameras = new Map();
    let isRecording = false;
    let recordingStartTime = null;
    let timerInterval = null;
    
    // Elements
    const mainButton = document.getElementById('mainButton');
    const timer = document.getElementById('timer');
    const statusText = document.getElementById('statusText');
    const buttonHint = document.getElementById('buttonHint');
    
    // Setup movements
    const movements = getAllMovements();
    const movementSelect = document.getElementById('movementSelect');
    movementSelect.innerHTML = '<option value="">-- Seleziona Movimento --</option>' +
      movements.map(m => `<option value="${m.id}">${m.icon} ${m.name}</option>`).join('');
    
    // Generate session ID
    sessionId = 'ses_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
    document.getElementById('sessionId').textContent = `ID: ${sessionId}`;
    
    // Camera link
    const cameraUrl = `${location.origin}/camera.html?s=${sessionId}`;
    document.getElementById('cameraLink').value = cameraUrl;
    
    window.copyLink = () => {
      navigator.clipboard.writeText(cameraUrl);
      alert('✅ Link copiato!');
    };
    
    window.shareLink = () => {
      const text = '📱 Apri questo link per connetterti come camera:\n\n';
      window.open(`https://wa.me/?text=${encodeURIComponent(text + cameraUrl)}`, '_blank');
    };
    
    window.showQR = () => {
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(cameraUrl)}`;
      document.getElementById('qrImage').src = qrUrl;
      document.getElementById('qrModal').style.display = 'flex';
    };
    
    // Listen for cameras
    DB.listen('cameras', (data) => {
      cameras.clear();
      
      if (data) {
        for (const [id, cam] of Object.entries(data)) {
          cameras.set(id, cam);
          
          // Assign session to new cameras
          if (!cam.session) {
            DB.set(`cameras/${id}/session`, { sessionId });
          }
        }
      }
      
      updateCameraGrid();
      updateButtonState();
    });
    
    function updateCameraGrid() {
      const grid = document.getElementById('cameraGrid');
      document.getElementById('cameraCount').textContent = cameras.size;
      
      if (cameras.size === 0) {
        grid.innerHTML = `
          <div class="empty-cameras">
            <p>📱 Nessuna camera connessa</p>
            <p style="font-size:13px;margin-top:10px">Condividi il link camera con i telefoni</p>
          </div>
        `;
        return;
      }
      
      grid.innerHTML = Array.from(cameras.entries()).map(([id, cam]) => `
        <div class="camera-card ${cam.status || 'ready'}">
          <div class="icon">📱</div>
          <div class="info">
            <div class="name">${cam.name || 'Camera'}</div>
            <div class="meta">${cam.position || 'Posizione'} · ${cam.quality || '720'}p</div>
          </div>
          <span class="status-badge ${cam.status || 'ready'}">${getStatusText(cam.status)}</span>
        </div>
      `).join('');
    }
    
    function getStatusText(status) {
      const texts = {
        ready: '✓ Pronto',
        recording: '⏺ REC',
        uploading: '⏳ Upload',
        uploaded: '✓ Caricato'
      };
      return texts[status] || 'Pronto';
    }
    
    function updateButtonState() {
      const hasReadyCameras = Array.from(cameras.values()).some(c => c.status === 'ready' || c.status === 'uploaded');
      const movement = movementSelect.value;
      
      if (isRecording) {
        mainButton.disabled = false;
        mainButton.className = 'big-button stop';
        mainButton.textContent = '⏹';
        buttonHint.textContent = 'Clicca per fermare la registrazione';
      } else if (cameras.size === 0) {
        mainButton.disabled = true;
        mainButton.className = 'big-button start';
        mainButton.textContent = '▶️';
        buttonHint.textContent = 'Connetti almeno una camera per iniziare';
      } else if (!movement) {
        mainButton.disabled = true;
        buttonHint.textContent = 'Seleziona un movimento';
      } else {
        mainButton.disabled = false;
        mainButton.className = 'big-button start';
        mainButton.textContent = '▶️';
        buttonHint.textContent = `${cameras.size} camera pronte - Clicca per iniziare`;
      }
    }
    
    movementSelect.addEventListener('change', updateButtonState);
    
    window.toggleRecording = async () => {
      if (isRecording) {
        await stopRecording();
      } else {
        await startRecording();
      }
    };
    
    async function startRecording() {
      const movement = movementSelect.value;
      const athleteName = document.getElementById('athleteName').value.trim() || 'Atleta';
      
      if (!movement) {
        alert('Seleziona un movimento');
        return;
      }
      
      isRecording = true;
      recordingStartTime = Date.now();
      
      // Create session
      await DB.set(`sessions/${sessionId}`, {
        athleteName,
        movement,
        startedAt: recordingStartTime,
        status: 'recording',
        cameraCount: cameras.size
      });
      
      // Send START command to all cameras
      await DB.set(`sessions/current/command`, {
        action: 'start',
        movement,
        sessionId,
        timestamp: Date.now()
      });
      
      // Update UI
      updateButtonState();
      timer.classList.add('recording');
      statusText.textContent = '⏺ REGISTRAZIONE IN CORSO';
      
      timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
        const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
        const sec = (elapsed % 60).toString().padStart(2, '0');
        timer.textContent = `${min}:${sec}`;
      }, 100);
    }
    
    async function stopRecording() {
      isRecording = false;
      clearInterval(timerInterval);
      
      // Send STOP command
      await DB.set(`sessions/current/command`, {
        action: 'stop',
        sessionId,
        timestamp: Date.now()
      });
      
      // Update session
      await DB.update(`sessions/${sessionId}`, {
        status: 'processing',
        stoppedAt: Date.now(),
        duration: timer.textContent
      });
      
      // Update UI
      updateButtonState();
      timer.classList.remove('recording');
      statusText.textContent = '⏳ Attendendo upload dalle camere...';
      
      // Wait for all cameras to upload, then trigger analysis
      checkUploadsAndAnalyze();
    }
    
    async function checkUploadsAndAnalyze() {
      // Poll for uploads
      const checkInterval = setInterval(async () => {
        const recordings = await DB.get(`recordings/${sessionId}`);
        
        if (recordings) {
          const uploadedCount = Object.values(recordings).filter(r => r.status === 'ready').length;
          statusText.textContent = `⏳ Upload: ${uploadedCount}/${cameras.size} camere...`;
          
          if (uploadedCount >= cameras.size) {
            clearInterval(checkInterval);
            await triggerAnalysis();
          }
        }
      }, 2000);
      
      // Timeout after 2 minutes
      setTimeout(() => {
        clearInterval(checkInterval);
        if (statusText.textContent.includes('Upload')) {
          triggerAnalysis(); // Analyze what we have
        }
      }, 120000);
    }
    
    async function triggerAnalysis() {
      statusText.textContent = '🤖 Inviando al bot per analisi...';
      
      const session = await DB.get(`sessions/${sessionId}`);
      const recordings = await DB.get(`recordings/${sessionId}`);
      
      // Create analysis request
      const analysisId = 'ana_' + Date.now().toString(36);
      await DB.set(`analysis/${analysisId}`, {
        sessionId,
        session,
        recordings,
        status: 'pending',
        createdAt: Date.now()
      });
      
      // The ANALIZER bot will pick this up and process
      // For now, create a placeholder report page
      const reportUrl = `${location.origin}/report.html?id=${analysisId}`;
      
      await DB.update(`sessions/${sessionId}`, {
        status: 'analyzing',
        analysisId,
        reportUrl
      });
      
      // Show results
      showResults(analysisId, reportUrl);
    }
    
    function showResults(analysisId, reportUrl) {
      statusText.textContent = '✅ Analisi inviata!';
      
      document.getElementById('resultsPanel').style.display = 'block';
      document.getElementById('resultsList').innerHTML = `
        <div class="result-card">
          <h4>📊 Report Generato</h4>
          <p style="margin:10px 0;color:#888">L'analisi è in elaborazione. Il report sarà disponibile a breve.</p>
          <a href="${reportUrl}" target="_blank" class="link">${reportUrl}</a>
          <div style="margin-top:15px;display:flex;gap:10px">
            <button class="btn btn-primary" onclick="window.open('${reportUrl}')">📊 Apri Report</button>
            <button class="btn btn-secondary" onclick="shareReport('${reportUrl}')">📱 Invia Link</button>
          </div>
        </div>
      `;
      
      // Reset for next session
      sessionId = 'ses_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
      document.getElementById('sessionId').textContent = `ID: ${sessionId}`;
      
      const newCameraUrl = `${location.origin}/camera.html?s=${sessionId}`;
      document.getElementById('cameraLink').value = newCameraUrl;
    }
    
    window.shareReport = (url) => {
      const text = '📊 Ecco il report della tua analisi movimento:\n\n';
      window.open(`https://wa.me/?text=${encodeURIComponent(text + url)}`, '_blank');
    };
  </script>
</body>
</html>
